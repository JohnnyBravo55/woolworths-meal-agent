<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meal Agent Connect</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Meal Agent <span class="ver">v1.0.1</span></h1>
      <p id="status" data-kind="">Ready to connect Woolworths.</p>
      <button id="connect" type="button">Connect Woolworths</button>
      <p class="hint">
        1) Open Connect Woolworths on the Meal Agent site and keep that tab open.<br />
        2) Sign in on woolworths.co.nz.<br />
        3) Press Connect here and wait for a green or red status message.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
